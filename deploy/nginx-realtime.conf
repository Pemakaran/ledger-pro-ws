# LedgerPro Realtime — nginx reverse proxy for realtime.<domain>
#
# Terminates TLS and forwards WebSocket + HTTP to the realtime container on
# 127.0.0.1:3001. Install:
#   sudo cp deploy/nginx-realtime.conf /etc/nginx/sites-available/realtime.ledgerpro.shop
#   sudo ln -s /etc/nginx/sites-available/realtime.ledgerpro.shop /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d realtime.ledgerpro.shop      # fills in the ssl_* lines
#   sudo nginx -t && sudo systemctl reload nginx
#
# The `map` below lives at http{} scope — sites-enabled/* are included inside
# http{}, so it is valid here. It is what makes the WebSocket upgrade work.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name realtime.ledgerpro.shop;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name realtime.ledgerpro.shop;

    # ssl_certificate / ssl_certificate_key are written in by certbot.

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets are long-lived — don't drop idle connections at the 60s default.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
