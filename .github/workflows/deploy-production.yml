# ╔═══════════════════════════════════════════════════════════════════╗
# ║  LedgerPro Realtime — Production CI/CD                             ║
# ║  Test → Build+push (GHCR) → Deploy (DigitalOcean droplet)         ║
# ╚═══════════════════════════════════════════════════════════════════╝
#
# On push to main: lint + test + build, then build the production image and push
# it to GHCR, then deploy to the droplet over SSH (pull the pinned image + roll
# the realtime service). The service shares `ledgerpro-network` and the redis
# from the backend prod stack, and verifies tokens against the backend's JWKS
# over that internal network.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   SERVER_HOST       — DigitalOcean droplet host / IP
#   SERVER_USER       — SSH user on the droplet
#   SSH_PRIVATE_KEY   — SSH private key for that user
#   GHCR_PAT          — GitHub PAT with read:packages (droplet pulls the image)
#
# One-time on the droplet (see docs/DEPLOY.md):
#   - place docker-compose.prod.yml in ~/ledgerpro-realtime and create
#     ~/ledgerpro-realtime/.env (from .env.production.example)
#   - add the nginx realtime.<domain> server block (deploy/nginx-realtime.conf)
#     and obtain its TLS cert; point a DNS A-record at the droplet.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-realtime-production
  cancel-in-progress: false

jobs:
  test:
    name: Test · Realtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test --passWithNoTests
      - run: pnpm run build

  build:
    name: Build & Push (GHCR)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.img.outputs.image }}
      image_tag: ${{ steps.img.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image ref (GHCR paths must be lowercase)
        id: img
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/ledgerpro-realtime" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ steps.img.outputs.image_tag }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (DigitalOcean Droplet)
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH (pull → restart)
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_PAT
          script: |
            set -euo pipefail
            cd ~/ledgerpro-realtime
            # Shared with the backend stack; idempotent so first deploy self-heals.
            docker network create ledgerpro-network 2>/dev/null || true
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
